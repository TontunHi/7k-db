name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    
    # Needs a DB for migrations in real environments,
    # but for testing, we can spin up a quick MySQL service if tests needed it.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: 7k-db-test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Run Linters
      run: npm run lint
      
    - name: Run Tests
      # We provide a mock default so crypto features don't crash
      env:
        SESSION_SECRET: test_session_secret_12345
      run: npm run test
      
    - name: Build Next.js
      run: npm run build

  migrate_and_deploy:
    needs: build_and_test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: Production

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Run Database Migrations
      env:
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_PORT: ${{ secrets.DB_PORT }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_SSL: ${{ secrets.DB_SSL }}
        DB_DEBUG: ${{ secrets.DB_DEBUG }}
      run: node scripts/migrate.mjs
      
    - name: Deploy Placeholder
      run: echo "Replace this step with your actual deployment logic (e.g. Docker Push, Vercel Deploy, or SSH Server Deploy)"
